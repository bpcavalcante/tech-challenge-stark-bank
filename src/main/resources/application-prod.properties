# PostgreSQL - perfil prod
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:challengedb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# Scheduler: 3 horas em produção
scheduler.invoice.rate-ms=10800000

# Stark Bank: chave via env var em produção (sem arquivo .pem)
stark.private.key.path=
stark.private.key=${STARK_PRIVATE_KEY:}
